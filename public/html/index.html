<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home | EasyAir</title>
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/script.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">
    </head>

    <body>
        <header>
            <div>
                <h1 id="logo">EasyAir</h1>
                <nav>
                    <a href="#home_about">Planes</a>
                    <a href="#home_features">Flights</a>
                    <a href="">Orders</a>
                </nav>
                <p id="montenegro_airport">Montenegro Airport</p>
            </div>
        </header>
        <div class="home_container_major" id="home_about">
            <div id="home_about_content">
                <div id="home_about_left">
                    <h1>Let EasyAir guarantee an easy flight for you!</h1>
                    <h3>We don't lose luggage. We gain our customers' trust.</h3>
                    <div id="home_about_buttons">
                        <button type="button" id="picture_A">Airport!</button>
                        <button type="button" id="picture_B">Nightview!</button>
                        <button type="button" id="picture_C">Interior!</button>
                    </div>
                </div>
                <div id="home_about_right"></div>
            </div>
        </div>
        <div class="home_container_major" id="home_features">
            <div id="home_features_content">
                <div class="inline_title">
                    <h1>Why</h1>
                    <h1 id="features_logo">EasyAir</h1>
                    <h1>?</h1>
                </div>
                <ul>
                    <li id="li_1">Inhalt 11111111111111111111111</li>
                    <li id="li_2">Inhalt 22222222222222222222222</li>
                    <li id="li_3">Inhalt 33333333333333333333333</li>
                </ul>
            </div>
        </div>
    </body>
</html>
